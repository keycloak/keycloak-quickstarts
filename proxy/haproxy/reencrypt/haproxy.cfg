global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    retries 3

frontend https_front
    # Below is the only configuration required if client-cert forwarding is not desired
    # bind *:8443 ssl crt /mnt/certs/haproxy-external.pem
    bind *:8443 ssl crt /mnt/certs/haproxy-external.pem ca-file /mnt/certs/client-ca.pem verify optional
    mode http

    # Not recommended in production
    # HTTP headers can contain sensitive information (falls under the purview of the GDPR or similar)
    log-format "${HAPROXY_HTTP_LOG_FMT} %{+Q}[var(txn.req_hdrs)]"
    http-request set-var(txn.req_hdrs) req.hdrs

    # Prevent external spoofing
    http-request del-header Forwarded
    http-request del-header x-forwarded-.* -m reg
    http-request del-header x-original-.* -m reg
    http-request del-header x-real-ip

    # Prevent client certificate header spoofing (RFC 9440)
    http-request del-header Client-Cert
    http-request del-header Client-Cert-Chain

    # Prevent external tracing context injection (W3C Trace Context / Baggage)
    http-request del-header traceparent
    http-request del-header tracestate
    http-request del-header baggage

    # Prevent external tracing context injection (Zipkin, Jaeger, OpenTracing)
    http-request del-header b3
    http-request del-header x-b3-.* -m reg
    http-request del-header uber-trace-id
    http-request del-header x-ot-span-context

    # Forward verified client certificate to Keycloak (RFC 9440 / RFC 8941 byte sequence)
    http-request set-header Client-Cert :%[ssl_c_der,base64]: if { ssl_c_used } { ssl_c_verify 0 }

    # Public paths. Revisit the reverse proxy guide for the latest guidance.
    # With these settings, the redirect to the welcome screen or Admin UI will not work from external IP addresses, and this is expected.
    acl is_public_path path_beg /realms/
    acl is_public_path path_beg /resources/
    acl is_public_path path_beg /.well-known/

    # Allowed source IP ranges. Replace with your internal IP address ranges.
    acl is_allowed_src src 192.168.0.0/16
    acl is_allowed_src src 10.0.0.0/8
    acl is_allowed_src src 127.0.0.0/8

    http-request deny unless is_public_path or is_allowed_src

    default_backend keycloak_back

backend keycloak_back
    mode http
    balance roundrobin
    option forwarded host by by_port for
    option httpchk GET /health/ready
    http-check expect status 200

    # Sticky Sessions
    use-server keycloak1 if { req.cook(AUTH_SESSION_ID) -m end keycloak1 }
    use-server keycloak2 if { req.cook(AUTH_SESSION_ID) -m end keycloak2 }

    server keycloak1 keycloak1:8443 ssl verify required crt /mnt/certs/haproxy-internal.pem ca-file /mnt/certs/keycloak1-cert.pem check port 9000 check-ssl verify none inter 5s fall 3 rise 2
    server keycloak2 keycloak2:8443 ssl verify required crt /mnt/certs/haproxy-internal.pem ca-file /mnt/certs/keycloak2-cert.pem check port 9000 check-ssl verify none inter 5s fall 3 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
