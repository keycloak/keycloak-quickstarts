<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <!-- Frontend network -->
  <rect x="30" y="60" width="460" height="160" rx="12" fill="#e8f4fd" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="50" y="82" font-size="11" fill="#1565c0" font-weight="600">frontend network</text>

  <!-- Backend network -->
  <rect x="30" y="240" width="460" height="190" rx="12" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="50" y="262" font-size="11" fill="#c62828" font-weight="600">backend network (internal)</text>

  <!-- Client -->
  <rect x="195" y="4" width="130" height="36" rx="6" fill="#fff" stroke="#616161" stroke-width="1.5"/>
  <text x="260" y="27" text-anchor="middle" font-weight="600">Client</text>

  <!-- Arrow Client -> HAProxy -->
  <line x1="260" y1="40" x2="260" y2="90" stroke="#616161" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="70" font-size="11" fill="#616161">:8443</text>

  <!-- HAProxy -->
  <rect x="175" y="90" width="170" height="44" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="260" y="117" text-anchor="middle" fill="#fff" font-weight="600">HAProxy</text>

  <!-- Arrow HAProxy -> KC1 -->
  <line x1="220" y1="134" x2="145" y2="280" stroke="#616161" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="148" y="210" font-size="11" fill="#616161">TCP</text>

  <!-- Arrow HAProxy -> KC2 -->
  <line x1="300" y1="134" x2="375" y2="280" stroke="#616161" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="358" y="210" font-size="11" fill="#616161">TCP</text>

  <!-- Keycloak 1 -->
  <rect x="65" y="280" width="160" height="44" rx="6" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="145" y="307" text-anchor="middle" fill="#fff" font-weight="600">Keycloak 1</text>

  <!-- Keycloak 2 -->
  <rect x="295" y="280" width="160" height="44" rx="6" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="375" y="307" text-anchor="middle" fill="#fff" font-weight="600">Keycloak 2</text>

  <!-- Arrows KC -> PostgreSQL -->
  <line x1="145" y1="324" x2="220" y2="370" stroke="#616161" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="324" x2="300" y2="370" stroke="#616161" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="185" y="370" width="150" height="44" rx="6" fill="#ef6c00" stroke="#e65100" stroke-width="1.5"/>
  <text x="260" y="397" text-anchor="middle" fill="#fff" font-weight="600">PostgreSQL</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#616161"/>
    </marker>
  </defs>
</svg>
