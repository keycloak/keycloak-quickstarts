services:
  postgres:
    image: mirror.gcr.io/postgres:18
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak1:
    image: quay.io/keycloak/keycloak:26.6
    command: start
    environment:
      # DB
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Metrics / Health
      KC_METRICS_ENABLED: "true"
      KC_EVENT_METRICS_USER_ENABLED: "true"
      KC_EVENT_METRICS_USER_TAGS: "realm,idp,clientId"
      KC_HEALTH_ENABLED: "true"
      # Hostname / HTTPS
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: "${KC_HOST}"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/key.pem
      KC_HTTPS_CLIENT_AUTH: required
      KC_HTTPS_TRUST_STORE_FILE: /opt/keycloak/conf/https-truststore/traefik-internal-cert.pem
      KC_HTTPS_MANAGEMENT_CLIENT_AUTH: none
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ACCESS_LOG_ENABLED: "true"
      # Misc
      KC_SHUTDOWN_DELAY: 30s
      KC_SHUTDOWN_TIMEOUT: 30s
      KC_SPI_CACHE_EMBEDDED__DEFAULT__NODE_NAME: keycloak1
    volumes:
      - source: ./certs/keycloak1
        target: /opt/keycloak/certs
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/traefik-internal/cert.pem
        target: /opt/keycloak/conf/https-truststore/traefik-internal-cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  keycloak2:
    image: quay.io/keycloak/keycloak:26.6
    command: start
    environment:
      # DB
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Metrics / Health
      KC_METRICS_ENABLED: "true"
      KC_EVENT_METRICS_USER_ENABLED: "true"
      KC_EVENT_METRICS_USER_TAGS: "realm,idp,clientId"
      KC_HEALTH_ENABLED: "true"
      # Hostname / HTTPS
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: "${KC_HOST}"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/key.pem
      KC_HTTPS_CLIENT_AUTH: required
      KC_HTTPS_TRUST_STORE_FILE: /opt/keycloak/conf/https-truststore/traefik-internal-cert.pem
      KC_HTTPS_MANAGEMENT_CLIENT_AUTH: none
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ACCESS_LOG_ENABLED: "true"
      # Misc
      KC_SHUTDOWN_DELAY: 30s
      KC_SHUTDOWN_TIMEOUT: 30s
      KC_SPI_CACHE_EMBEDDED__DEFAULT__NODE_NAME: keycloak2
    volumes:
      - source: ./certs/keycloak2
        target: /opt/keycloak/certs
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/traefik-internal/cert.pem
        target: /opt/keycloak/conf/https-truststore/traefik-internal-cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  traefik:
    image: mirror.gcr.io/traefik:v3.6
    environment:
      - DOCKER_API_VERSION=1.54
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.file.filename=/etc/traefik/config.yaml"
      - "--entrypoints.websecure.address=:8443"
    volumes:
      - source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind
        read_only: true
      - source: ./certs/traefik-external/cert.pem
        target: /certs/traefik-external/cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/traefik-external/key.pem
        target: /certs/traefik-external/key.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/traefik-internal/cert.pem
        target: /certs/traefik-internal/cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/traefik-internal/key.pem
        target: /certs/traefik-internal/key.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/keycloak1/cert.pem
        target: /certs/keycloak1-cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./certs/keycloak2/cert.pem
        target: /certs/keycloak2-cert.pem
        type: bind
        read_only: true
        bind:
          selinux: z
      - source: ./config.yaml
        target: /etc/traefik/config.yaml
        type: bind
        read_only: true
        bind:
          selinux: z
    ports:
      - "8443:8443"
      - "8080:8080"
    depends_on:
      - keycloak1
      - keycloak2
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:
    internal: true