# =========================================================================
# NOTE: ADMIN UI hostname and port ISOLATION
#   - Uncomment Admin router section (keycloak-admin)(lines 103-112)
#   - Comment keycloak-internal section (lines 88-98)
# =========================================================================
tls:
  certificates:
    - certFile: /certs/traefik-external/cert.pem
      keyFile: /certs/traefik-external/key.pem
  options:
    default:
      clientAuth:
        caFiles:
          - /certs/client-ca-chain.pem
        clientAuthType: VerifyClientCertIfGiven

http:
  serversTransports:
    keycloak-transport:
      certificates:
        - certFile: /certs/traefik-internal/cert.pem
          keyFile: /certs/traefik-internal/key.pem
      rootCAs:
        - /certs/keycloak1-cert.pem
        - /certs/keycloak2-cert.pem

  middlewares:
    filter-headers:
      headers:
        customRequestHeaders:
          # Strip the forwarding headers to prevent spoofing and ensure that Keycloak receives the correct client information.
          Forwarded: ""
          X-Forwarded-For: ""
          X-Forwarded-Proto: ""
          X-Forwarded-Host: ""
          X-Forwarded-Port: ""
          X-Forwarded-Server: ""
          X-Forwarded-Prefix: ""
          X-Forwarded-Access-Token: ""
          # Strip reverse proxy metadata headers to prevent URL/method/IP forgery
          X-Original-Forwarded-For: ""
          X-Original-URL: ""
          X-Original-Method: ""
          X-Real-IP: ""
          # Strip client certificate header to prevent spoofing (RFC 9440)
          X-Forwarded-Tls-Client-Cert: ""
          X-Forwarded-Tls-Client-Cert-Info: ""
          # Strip distributed tracing headers to prevent trace context injection.
          Traceparent: ""
          Tracestate: ""
          Baggage: ""
          B3: ""
          X-B3-Traceid: ""
          X-B3-Spanid: ""
          X-B3-Parentspanid: ""
          X-B3-Sampled: ""
          X-B3-Flags: ""
          Uber-Trace-Id: ""
          X-Ot-Span-Context: ""

    pass-client-cert:
      passTLSClientCert:
        pem: true

    ip-allowlist:
      ipAllowList:
        sourceRange:
          - "192.168.0.0/16"
          - "10.0.0.0/8"
          - "127.0.0.0/8"
          - "172.16.0.0/12"

  routers:
    # Public router: exposes only the paths needed for external clients.
    # Accessible from any source IP address.
    keycloak-public:
      entryPoints:
        - keycloak
      rule: "PathPrefix(`/realms/`) || PathPrefix(`/resources/`) || PathPrefix(`/.well-known/`)"
      middlewares:
        - filter-headers
        - pass-client-cert
      tls: { }
      service: keycloak

    # Internal router: all other paths are restricted to the allowed source IP ranges.
    # This prevents external access to the Admin API and Admin Console.
    keycloak-internal:
      entryPoints:
        - keycloak
      rule: "PathPrefix(`/`)"
      priority: 1
      middlewares:
        - filter-headers
        - pass-client-cert
        - ip-allowlist
      tls: { }
      service: keycloak

# Uncomment this Admin router section if you have the admin UI and admin API on a separate hostname and port
#    # Admin router: routes traffic from the admin hostname.
#    # Restricted to the allowed source IP ranges.
#    keycloak-admin:
#      entryPoints:
#        - keycloak-admin
#      rule: "PathPrefix(`/`)"
#      middlewares:
#        - filter-headers
#        - pass-client-cert
#        - ip-allowlist
#      tls: { }
#      service: keycloak

  services:
    keycloak:
      loadBalancer:
        serversTransport: keycloak-transport
        healthCheck:
          path: /health/ready
          port: 9000
          scheme: https
          interval: "5s"
          timeout: "3s"
        servers:
          - url: "https://keycloak1:8443"
          - url: "https://keycloak2:8443"