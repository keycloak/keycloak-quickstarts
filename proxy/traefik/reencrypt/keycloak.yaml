tls:
  certificates:
    - certFile: /certs/traefik-external/cert.pem
      keyFile: /certs/traefik-external/key.pem

http:
  serversTransports:
    keycloak-transport:
      certificates:
        - certFile: /certs/traefik-internal/cert.pem
          keyFile: /certs/traefik-internal/key.pem
      rootCAs:
        - /certs/keycloak1-cert.pem
        - /certs/keycloak2-cert.pem

  middlewares:
    filter-headers:
      headers:
        customRequestHeaders:
          # Strip the forwarding headers to prevent spoofing and ensure that Keycloak receives the correct client information.
          Forwarded: ""
          X-Forwarded-For: ""
          X-Forwarded-Proto: ""
          X-Forwarded-Host: ""
          X-Forwarded-Port: ""
          X-Forwarded-Server: ""
          X-Forwarded-Prefix: ""
          X-Forwarded-Access-Token: ""
          # Strip reverse proxy metadata headers to prevent URL/method/IP forgery
          X-Original-Forwarded-For: ""
          X-Original-URL: ""
          X-Original-Method: ""
          X-Real-IP: ""
          # Strip distributed tracing headers to prevent trace context injection.
          Traceparent: ""
          Tracestate: ""
          Baggage: ""
          B3: ""
          X-B3-Traceid: ""
          X-B3-Spanid: ""
          X-B3-Parentspanid: ""
          X-B3-Sampled: ""
          X-B3-Flags: ""
          Uber-Trace-Id: ""
          X-Ot-Span-Context: ""

  routers:
    keycloak:
      entryPoints:
        - keycloak
      rule: "PathPrefix(`/`)"
      middlewares:
        - filter-headers
      tls: {}
      service: keycloak

  services:
    keycloak:
      loadBalancer:
        serversTransport: keycloak-transport
        healthCheck:
          path: /health/ready
          port: 9000
          scheme: https
          interval: "5s"
          timeout: "3s"
        servers:
          - url: "https://keycloak1:8443"
          - url: "https://keycloak2:8443"