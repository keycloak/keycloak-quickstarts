tcp:
  routers:
    my-router:
      rule: "HostSNI(`*`)"
      service: "keycloak-service"
      priority: 100
      entryPoints:
        - "websecure"
      tls:
        passthrough: true  # Forward encrypted traffic as-is

  serversTransports:
    kc-passthrough:
      proxyProtocol:
        version: 2

  services:
    keycloak-service:
      loadBalancer:
        serversTransport: kc-passthrough
        healthCheck:
          interval: "5s"
          timeout: "3s"
          port: 9000
          # Standard HTTP/1.0 request for maximum L4 compatibility
          send: "GET /health/ready HTTP/1.0\r\n\r\n"
          # Matches the status text in Keycloak's health JSON
          expect: "OK"
        servers:
          - address: "keycloak1:8443"
          - address: "keycloak2:8443"