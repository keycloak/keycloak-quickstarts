<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Success!</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4 border-success">
  <h2 class="text-success">Login Successful!</h2>
  <p>Your device is now authorized. Here is the Access Token received from Keycloak:</p>
  <div class="alert alert-dark" style="word-break: break-all;">
    <code th:text="${token}"></code>
  </div>
  <form th:action="@{/logout}" method="post">
    <button type="submit" class="btn btn-danger">
      Start Over (Logout)
    </button>
  </form>
</div>
</body>
</html>
